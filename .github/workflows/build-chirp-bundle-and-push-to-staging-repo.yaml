name: Build CHIRP bundle and push to staging repo

on:
  workflow_dispatch:
  repository_dispatch:
    types: [chirp-new-version]
  push:
    branches:
      - main

jobs:
  build-chirp-bundle-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Scraper
        uses: actions/checkout@v4
        with:
          ref: scraper
          path: scraper

      - name: Compile Scraper
        run: |
          cd scraper
          go build -o ../scraper.bin main.go
          cd ..
          chmod +x scraper.bin

      - name: Determine wheel name and path
        id: wheel
        run: |
          WHEEL_NAME=$(./scraper.bin --wheelName)
          URL_NO_WHEEL=$(./scraper.bin --urlNoWheel)
          echo "wheel_name=$WHEEL_NAME" >> $GITHUB_OUTPUT
          echo "url_no_wheel=$URL_NO_WHEEL" >> $GITHUB_OUTPUT

      - name: Check for existing release by tag and name
        id: existing
        run: |
          TAG=${{ steps.wheel.outputs.wheel_name }}
          resp=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          if echo "$resp" | grep -q '"Not Found"'; then
            echo "release_exists=false" >> $GITHUB_OUTPUT
          else
            # compare release name with wheel name
            existing_name=$(echo "$resp" | jq -r '.name')
            if [ "$existing_name" = "$TAG" ]; then
              echo "release_exists=true" >> $GITHUB_OUTPUT
            else
              echo "release_exists=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Installing Build Deps
        if: steps.existing.outputs.release_exists == 'false'
        run: |
          sudo apt update -y
          sudo apt install -y python3 libgtk-3-dev libwebkit2gtk-4.0-dev libjpeg-dev libtiff-dev libpng-dev jq
          python3 --version

      - name: Fetch and add CHIRP to bundle
        if: steps.existing.outputs.release_exists == 'false'
        run: |
          wget --header="User-Agent: Mozilla/5.0 (X11; Linux x86_64; rv:117.0) Gecko/20100101 Firefox/117.0" \
            ${{ steps.wheel.outputs.url_no_wheel }}${{ steps.wheel.outputs.wheel_name }}
          mkdir chirp-bundle
          python3 -m pip install --prefix chirp-bundle ./${{ steps.wheel.outputs.wheel_name }}

      - name: Make CHIRP Bundle Tarball
        if: steps.existing.outputs.release_exists == 'false'
        run: |
          tar -czvf chirp-bundle.tgz -C chirp-bundle .
          ls -lh chirp-bundle.tgz

      - uses: ncipollo/release-action@v1
        if: steps.existing.outputs.release_exists == 'false'
        with:
          tag: ${{ steps.wheel.outputs.wheel_name }}
          name: ${{ steps.wheel.outputs.wheel_name }}
          artifacts: "chirp-bundle.tgz"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-manifest-to-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout manifest branch
        uses: actions/checkout@v4
        with:
          ref: manifest
          path: manifest

      - name: Checkout staging repo
        uses: actions/checkout@v4
        with:
          repository: Satisflux-Laboratories/flathub
          ref: io.github.satisflux.chirp
          path: staging

      - name: Push to another repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          rm -rf staging/*
          cp -r manifest/* staging/
          cd staging

          git add .
          git commit -m "Pushed to staging from chirp-flatpak"
          git push origin io.github.satisflux.chirp
